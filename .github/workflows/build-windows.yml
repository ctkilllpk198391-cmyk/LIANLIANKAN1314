name: Build Windows Setup

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag (e.g. v0.1.0). Empty = artifact only.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1 appdirs setuptools
          pip install fastapi pydantic aiohttp httpx sqlalchemy aiosqlite python-dotenv pyyaml humancursor pywin32 uiautomation
          # 多 wxauto 引擎 fallback · 任一装上即可
          # PowerShell 不支持 bash 的 ||,用 LASTEXITCODE 重置避免 step fail
          foreach ($pkg in 'wxautox4', 'wxauto4', 'wxautox', 'wxauto') {
              pip install $pkg
              if ($LASTEXITCODE -eq 0) { Write-Host "✓ $pkg OK" } else { Write-Host "✗ $pkg SKIP (no wheel for Python 3.11 or pkg not on pypi)" }
              $global:LASTEXITCODE = 0
          }

      - name: Verify imports work on Windows
        shell: pwsh
        run: |
          python -c "import client.main; print('client.main import OK')"
          python -c "
          for name in ['wxautox4', 'wxauto4', 'wxautox', 'wxauto', 'uiautomation']:
              try:
                  __import__(name); print(f'{name}: OK')
              except ImportError as e:
                  print(f'{name}: MISSING ({e})')
          "

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller installer/wechat_agent.spec --clean --noconfirm
          if (-not (Test-Path "dist/wechat_agent.exe")) {
            Write-Error "PyInstaller did not produce dist/wechat_agent.exe"
            exit 1
          }
          Write-Host "EXE size:"
          (Get-Item "dist/wechat_agent.exe").Length / 1MB

      - name: Install Inno Setup via Chocolatey
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      # Removed: ChineseSimplified language pack download (setup.iss now uses default English)

      - name: Build Setup.exe with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer/setup.iss
          if (-not (Test-Path "dist/WechatAgent-Setup.exe")) {
            Write-Error "Inno Setup did not produce WechatAgent-Setup.exe"
            exit 1
          }
          Write-Host "Setup size:"
          (Get-Item "dist/WechatAgent-Setup.exe").Length / 1MB

      - name: Disable Defender realtime scan + add exclusions (CI speed)
        shell: pwsh
        continue-on-error: true
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:LocalAppData\WechatAgent" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:TEMP" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "D:\a\LIANLIANKAN1314" -ErrorAction SilentlyContinue
          Write-Host "Defender realtime: $((Get-MpPreference).DisableRealtimeMonitoring)"

      - name: Verify setup.exe install behavior (no run, avoid --onefile slow start)
        shell: pwsh
        timeout-minutes: 10
        run: |
          Write-Host "=== [1/4] SILENT install ===" -ForegroundColor Cyan
          $logPath = "$env:TEMP\setup_install.log"
          # Removed /CURRENTUSER — was triggering hidden privilege dialog deadlock
          $proc = Start-Process -Wait -PassThru -FilePath "dist\WechatAgent-Setup.exe" `
            -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/LOG=$logPath"
          Write-Host "Install exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Get-Content $logPath -Tail 40 -ErrorAction SilentlyContinue
            throw "SILENT install failed (exit $($proc.ExitCode))"
          }

          Write-Host ""
          Write-Host "=== [2/4] check installed exe ===" -ForegroundColor Cyan
          $exe = "$env:LocalAppData\WechatAgent\wechat_agent.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem "$env:LocalAppData\WechatAgent" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length
            throw "Installed exe missing: $exe"
          }
          $sz = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "Installed: $exe ($sz MB)"

          Write-Host ""
          Write-Host "=== [3/4] check .env written ===" -ForegroundColor Cyan
          $envFile = "$env:LocalAppData\WechatAgent\.env"
          if (-not (Test-Path $envFile)) { throw ".env missing: $envFile" }
          Write-Host "--- .env contents ---"
          Get-Content $envFile

          Write-Host ""
          Write-Host "=== [4/4] check shortcut + autostart ===" -ForegroundColor Cyan
          $lnk = "$env:USERPROFILE\Desktop\WechatAgent.lnk"
          if (Test-Path $lnk) { Write-Host "OK desktop shortcut: $lnk" } else { Write-Host "WARN no desktop shortcut" }
          $reg = Get-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run" -Name "WechatAgent" -ErrorAction SilentlyContinue
          if ($reg) { Write-Host "OK autostart registered: $($reg.WechatAgent)" } else { Write-Host "WARN no autostart" }

          Write-Host ""
          Write-Host "=== Install verification PASSED ===" -ForegroundColor Green

      - name: End-to-end · run wechat_agent.exe --check-only (server reachability)
        shell: pwsh
        timeout-minutes: 5
        run: |
          Write-Host "=== run installed wechat_agent.exe --check-only ===" -ForegroundColor Cyan
          $exe = "$env:LocalAppData\WechatAgent\wechat_agent.exe"
          $env:PYTHONIOENCODING = "utf-8"
          $env:PYTHONUNBUFFERED = "1"
          # --onefile bootstrap might take 30-60s on Defender-scanned runner
          $proc = Start-Process -Wait -PassThru -FilePath $exe `
            -ArgumentList "--tenant","tenant_0001","--server","http://120.26.208.212","--check-only" `
            -RedirectStandardOutput "$env:TEMP\client_out.log" `
            -RedirectStandardError "$env:TEMP\client_err.log"
          Write-Host "Exit code: $($proc.ExitCode)"
          Write-Host ""
          Write-Host "--- stdout ---"
          Get-Content "$env:TEMP\client_out.log" -ErrorAction SilentlyContinue
          Write-Host ""
          Write-Host "--- stderr ---"
          Get-Content "$env:TEMP\client_err.log" -ErrorAction SilentlyContinue
          if ($proc.ExitCode -ne 0) { throw "wechat_agent.exe --check-only failed (exit $($proc.ExitCode))" }
          Write-Host ""
          Write-Host "=== End-to-end PASSED · client connects to server ===" -ForegroundColor Green

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WechatAgent-Setup
          path: dist/WechatAgent-Setup.exe
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WechatAgent-Setup.exe
          generate_release_notes: true
