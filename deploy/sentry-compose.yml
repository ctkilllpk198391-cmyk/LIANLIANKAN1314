version: "3.9"

# 白羊 Sentry self-hosted (简化版)
# 仅 sentry + postgres + redis 三个服务
# 用法: docker compose -f deploy/sentry-compose.yml up -d

# 说明: 完整 sentry self-hosted 参考 https://github.com/getsentry/self-hosted
# 本文件为简化版，适合单机快速验证。生产建议用官方 self-hosted 仓库。

networks:
  sentry-net:
    driver: bridge

volumes:
  sentry-pgdata:
  sentry-redisdata:
  sentry-data:

x-sentry-defaults: &sentry-defaults
  image: sentry:23.12
  environment:
    SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY:?SENTRY_SECRET_KEY required}
    SENTRY_POSTGRES_HOST: sentry-postgres
    SENTRY_POSTGRES_PORT: "5432"
    SENTRY_DB_NAME: sentry
    SENTRY_DB_USER: sentry
    SENTRY_DB_PASSWORD: ${SENTRY_DB_PASSWORD:?SENTRY_DB_PASSWORD required}
    SENTRY_REDIS_HOST: sentry-redis
    SENTRY_REDIS_PORT: "6379"
  depends_on:
    - sentry-postgres
    - sentry-redis
  networks:
    - sentry-net

services:

  # ─── PostgreSQL for Sentry ──────────────────────────────────────────────────
  sentry-postgres:
    image: postgres:16
    container_name: sentry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: ${SENTRY_DB_PASSWORD}
      POSTGRES_DB: sentry
    volumes:
      - sentry-pgdata:/var/lib/postgresql/data
    networks:
      - sentry-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis for Sentry ──────────────────────────────────────────────────────
  sentry-redis:
    image: redis:7-alpine
    container_name: sentry-redis
    restart: unless-stopped
    volumes:
      - sentry-redisdata:/data
    networks:
      - sentry-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Sentry Web ────────────────────────────────────────────────────────────
  sentry-web:
    <<: *sentry-defaults
    container_name: sentry-web
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - sentry-data:/var/lib/sentry/files
    command: sentry run web

  # ─── Sentry Worker ─────────────────────────────────────────────────────────
  sentry-worker:
    <<: *sentry-defaults
    container_name: sentry-worker
    restart: unless-stopped
    command: sentry run worker

  # ─── Sentry Cron ────────────────────────────────────────────────────────────
  sentry-cron:
    <<: *sentry-defaults
    container_name: sentry-cron
    restart: unless-stopped
    command: sentry run cron
